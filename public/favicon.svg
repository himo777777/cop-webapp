<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square base -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- 2x2 calendar grid (subtle, offset top-left) -->
  <rect x="7" y="7" width="8" height="8" rx="1.5" fill="#3b82f6" opacity="0.25"/>
  <rect x="17" y="7" width="8" height="8" rx="1.5" fill="#3b82f6" opacity="0.15"/>
  <rect x="7" y="17" width="8" height="8" rx="1.5" fill="#3b82f6" opacity="0.15"/>
  <rect x="17" y="17" width="8" height="8" rx="1.5" fill="#3b82f6" opacity="0.25"/>
  <!-- Medical cross / pulse integrated into grid -->
  <!-- Horizontal pulse line across center -->
  <polyline points="6,16 12,16 14,11.5 16,20.5 18,16 26,16"
    stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small cross accent in top-left cell -->
  <line x1="11" y1="9.5" x2="11" y2="12.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="9.5" y1="11" x2="12.5" y2="11" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
</svg>
